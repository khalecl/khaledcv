                <textarea id="editor" placeholder="Paste or write your markdown here..." spellcheck="false"># Document Title

              <button class="clear-btn" id="mathToggleBtn">🔢 Math: KaTeX</button>

    <script>
        const editor = document.getElementById('editor');
        const preview = document.getElementById('preview');
        const convertBtn = document.getElementById('convertBtn');
        const copyBtn = document.getElementById('copyBtn');
        const clearBtn = document.getElementById('clearBtn');
        const messageEl = document.getElementById('message');
        const mdFile = document.getElementById('mdFile');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');

        function setProgress(percent) {
            progressBar.style.width = percent + '%';
        }

        function showProgress() {
            progressContainer.classList.add('active');
            setProgress(0);
        }

        function hideProgress() {
            progressContainer.classList.remove('active');
        }

        // Handle file upload
        mdFile.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const content = event.target.result;
                editor.value = content;
                preview.innerHTML = marked.parse(content);
                showMessage('✓ File loaded successfully!', 'success');
                mdFile.value = '';
            };
            reader.onerror = () => {
                showMessage('Error reading file', 'error');
            };
            reader.readAsText(file);
        });

// Initialize mermaid
        mermaid.initialize({ startOnLoad: false, theme: 'default' });

        let mermaidCounter = 0;
        let mathRenderer = 'katex'; // 'katex' or 'mathjax'

        const mathToggleBtn = document.getElementById('mathToggleBtn');
        mathToggleBtn.addEventListener('click', () => {
            mathRenderer = mathRenderer === 'katex' ? 'mathjax' : 'katex';
            mathToggleBtn.textContent = '🔢 Math: ' + (mathRenderer === 'katex' ? 'KaTeX' : 'MathJax');
            mathToggleBtn.classList.toggle('math-active', mathRenderer === 'mathjax');
            renderPreview();
        });

        async function renderPreview() {
            let md = editor.value;

            // Extract mermaid blocks BEFORE marked processes them
            const mermaidBlocks = [];
            md = md.replace(/```mermaid\s*\n([\s\S]*?)```/g, (match, code) => {
                const id = 'mermaid-placeholder-' + mermaidBlocks.length;
                mermaidBlocks.push({ id, code: code.trim() });
                return '<div id="' + id + '" class="mermaid-container"></div>';
            });

            // Parse markdown
            preview.innerHTML = marked.parse(md);

            // Render LaTeX based on selected renderer
            if (mathRenderer === 'katex') {
                renderMathInElement(preview, {
                    delimiters: [
                        { left: '$$', right: '$$', display: true },
                        { left: '$', right: '$', display: false },
                        { left: '\\(', right: '\\)', display: false },
                        { left: '\\[', right: '\\]', display: true }
                    ],
                    throwOnError: false
                });
            } else {
                // MathJax
                if (window.MathJax && MathJax.typesetPromise) {
                    await MathJax.typesetPromise([preview]);
                }
            }

            // Render mermaid diagrams
            for (const block of mermaidBlocks) {
                const el = document.getElementById(block.id);
                if (el) {
                    try {
                        mermaidCounter++;
                        const graphId = 'mermaid-graph-' + mermaidCounter;
                        const { svg } = await mermaid.render(graphId, block.code);
                        el.innerHTML = svg;
                    } catch (e) {
                        el.innerHTML = '<pre style="color:red;">Mermaid error: ' + e.message + '</pre>';
                    }
                }
            }
        }

        // Update preview
        let previewTimeout;
        editor.addEventListener('input', () => {
            clearTimeout(previewTimeout);
            previewTimeout = setTimeout(renderPreview, 300);
        });

        // Initial preview
        renderPreview();

        // Clear
        clearBtn.addEventListener('click', () => {
            if (confirm('Clear all content?')) {
                editor.value = '';
                preview.innerHTML = '';
            }
        });

        function showMessage(text, type) {
            messageEl.className = 'message ' + type;
            messageEl.textContent = text;
            setTimeout(() => {
                messageEl.className = '';
                messageEl.textContent = '';
            }, 3000);
        }

        // Copy formatted content
        copyBtn.addEventListener('click', async () => {
            try {
                const html = preview.innerHTML;
                
                const blob = new Blob([html], { type: 'text/html' });
                const item = new ClipboardItem({
                    'text/html': blob,
                    'text/plain': new Blob([editor.value], { type: 'text/plain' })
                });
                
                await navigator.clipboard.write([item]);
                showMessage('✓ Formatted content copied to clipboard!', 'success');
            } catch (error) {
                try {
                    await navigator.clipboard.writeText(editor.value);
                    showMessage('✓ Content copied as text!', 'success');
                } catch (err) {
                    console.error('Copy error:', err);
                    showMessage('Error copying to clipboard', 'error');
                }
            }
        });

        // Convert
        convertBtn.addEventListener('click', async () => {
            const markdown = editor.value.trim();
            if (!markdown) {
                showMessage('Please enter markdown content', 'error');
                return;
            }

            convertBtn.disabled = true;
            convertBtn.textContent = '⏳ Converting...';
            showProgress();

            try {
                setProgress(25);
                const docxBlob = await markdownToDocx(markdown);
                setProgress(75);
                saveAs(docxBlob, 'document.docx');
                setProgress(100);
                showMessage('✓ Downloaded successfully!', 'success');
                setTimeout(hideProgress, 500);
            } catch (error) {
                console.error('Error:', error);
                showMessage('Error: ' + error.message, 'error');
                hideProgress();
            } finally {
                convertBtn.disabled = false;
                convertBtn.textContent = '⬇️ Download as DOCX';
            }
        });
// Capture a DOM element as a base64 PNG string (no data: prefix)
        async function elementToBase64Png(element) {
            const canvas = await html2canvas(element, { backgroundColor: '#ffffff', scale: 2 });
            return canvas.toDataURL('image/png').split(',')[1];
        }

 // Convert LaTeX to Office MathML (OMML) XML string
        function latexToOMML(latexStr) {
                    try {
                        // Try KaTeX first
                        const mathml = katex.renderToString(latexStr, { output: 'mathml', throwOnError: true });
                        const parser = new DOMParser();
                        const doc = parser.parseFromString(mathml, 'text/html');
                        const mathEl = doc.querySelector('math');
                        if (mathEl) return mathMLToOMML(mathEl);
                    } catch(e) {
                        // KaTeX failed, try MathJax
                    }

                    // Fallback: try MathJax MathML output
                    try {
                        if (window.MathJax && MathJax.tex2mml) {
                            const mmlStr = MathJax.tex2mml(latexStr);
                            const parser = new DOMParser();
                            const doc = parser.parseFromString(mmlStr, 'application/xml');
                            const mathEl = doc.querySelector('math');
                            if (mathEl) return mathMLToOMML(mathEl);
                        }
                    } catch(e) {
                        // Both failed
                    }

                    // Last resort: render as plain text
                    return '<m:oMath xmlns:m="http://schemas.openxmlformats.org/officeDocument/2006/math"><m:r><m:t>' + escapeXml(latexStr) + '</m:t></m:r></m:oMath>';
                }

        // Convert a MathML DOM element tree to OMML XML string
        function mathMLToOMML(mathEl) {
            let omml = '<m:oMath xmlns:m="http://schemas.openxmlformats.org/officeDocument/2006/math">';
            omml += convertMathMLChildren(mathEl);
            omml += '</m:oMath>';
            return omml;
        }

        function convertMathMLChildren(node) {
            let omml = '';
            for (const child of node.childNodes) {
                omml += convertMathMLNode(child);
            }
            return omml;
        }

        function convertMathMLNode(node) {
            if (node.nodeType === 3) {
                // Text node
                const text = node.textContent.trim();
                if (!text) return '';
                return wrapOMMLRun(text);
            }
            if (node.nodeType !== 1) return '';

            const tag = node.tagName.toLowerCase();

            switch (tag) {
                case 'semantics':
                    // Process first child (presentation MathML)
                    if (node.firstElementChild) return convertMathMLNode(node.firstElementChild);
                    return '';
                case 'annotation':
                    return '';
                case 'math':
                    return convertMathMLChildren(node);
                case 'mrow':
                    return convertMathMLChildren(node);
                case 'mi': {
                    const text = node.textContent.trim();
                    // Italic for single-char identifiers
                    if (text.length === 1 && text.match(/[a-zA-Z]/)) {
                        return '<m:r><m:rPr><m:sty m:val="i"/></m:rPr><m:t>' + escapeXml(text) + '</m:t></m:r>';
                    }
                    return wrapOMMLRun(text);
                }
                case 'mn':
                    return wrapOMMLRun(node.textContent.trim());
                case 'mo':
                    return wrapOMMLRun(node.textContent.trim());
                case 'mtext':
                    return '<m:r><m:rPr><m:sty m:val="p"/></m:rPr><m:t>' + escapeXml(node.textContent) + '</m:t></m:r>';
                case 'msup': {
                    const base = node.children[0];
                    const sup = node.children[1];
                    if (!base || !sup) return convertMathMLChildren(node);
                    return '<m:sSup><m:e>' + convertMathMLNode(base) + '</m:e><m:sup>' + convertMathMLNode(sup) + '</m:sup></m:sSup>';
                }
                case 'msub': {
                    const base = node.children[0];
                    const sub = node.children[1];
                    if (!base || !sub) return convertMathMLChildren(node);
                    return '<m:sSub><m:e>' + convertMathMLNode(base) + '</m:e><m:sub>' + convertMathMLNode(sub) + '</m:sub></m:sSub>';
                }
                case 'msubsup': {
                    const base = node.children[0];
                    const sub = node.children[1];
                    const sup = node.children[2];
                    if (!base || !sub || !sup) return convertMathMLChildren(node);
                    return '<m:sSubSup><m:e>' + convertMathMLNode(base) + '</m:e><m:sub>' + convertMathMLNode(sub) + '</m:sub><m:sup>' + convertMathMLNode(sup) + '</m:sup></m:sSubSup>';
                }
                case 'mfrac': {
                    const num = node.children[0];
                    const den = node.children[1];
                    if (!num || !den) return convertMathMLChildren(node);
                    return '<m:f><m:num>' + convertMathMLNode(num) + '</m:num><m:den>' + convertMathMLNode(den) + '</m:den></m:f>';
                }
                case 'msqrt':
                    return '<m:rad><m:radPr><m:degHide m:val="1"/></m:radPr><m:deg/><m:e>' + convertMathMLChildren(node) + '</m:e></m:rad>';
                case 'mroot': {
                    const base = node.children[0];
                    const idx = node.children[1];
                    if (!base || !idx) return convertMathMLChildren(node);
                    return '<m:rad><m:deg>' + convertMathMLNode(idx) + '</m:deg><m:e>' + convertMathMLNode(base) + '</m:e></m:rad>';
                }
                case 'mover': {
                    const base = node.children[0];
                    const over = node.children[1];
                    if (!base || !over) return convertMathMLChildren(node);
                    const overText = over.textContent.trim();
                    // Common accents
                    if (overText === '¯' || overText === '‾') {
                        return '<m:bar><m:barPr><m:pos m:val="top"/></m:barPr><m:e>' + convertMathMLNode(base) + '</m:e></m:bar>';
                    }
                    return '<m:limUpp><m:e>' + convertMathMLNode(base) + '</m:e><m:lim>' + convertMathMLNode(over) + '</m:lim></m:limUpp>';
                }
                case 'munder': {
                    const base = node.children[0];
                    const under = node.children[1];
                    if (!base || !under) return convertMathMLChildren(node);
                    return '<m:limLow><m:e>' + convertMathMLNode(base) + '</m:e><m:lim>' + convertMathMLNode(under) + '</m:lim></m:limLow>';
                }
                case 'munderover': {
                    const base = node.children[0];
                    const under = node.children[1];
                    const over = node.children[2];
                    if (!base || !under || !over) return convertMathMLChildren(node);

        // Render mermaid code to offscreen SVG and capture as PNG base64
        async function mermaidToBase64Png(code) {
            const container = document.createElement('div');
            container.style.cssText = 'position:absolute;left:-9999px;top:0;background:#fff;padding:20px;';
            document.body.appendChild(container);
            mermaidCounter++;
            const graphId = 'mermaid-export-' + mermaidCounter;
            try {
                const { svg } = await mermaid.render(graphId, code);
                container.innerHTML = svg;
                // Wait for SVG to layout
                await new Promise(r => setTimeout(r, 100));
                const base64 = await elementToBase64Png(container);
                const width = container.offsetWidth;
                const height = container.offsetHeight;
                document.body.removeChild(container);
                return { base64, width, height };
            } catch (e) {
                document.body.removeChild(container);
                return null;
            }
        }
        // Create valid DOCX with proper styles

async function markdownToDocx(markdown) {
            const zip = new JSZip();

            // Pre-render Mermaid blocks to images only (LaTeX will be native OMML)
            const imageMap = {};
            let imageIndex = 0;

              // Extract display LaTeX: $$...$$ — convert to OMML (no image needed)
                const displayLatexBlocks = [];
                let m;
                const displayRegex = /\$\$([\s\S]*?)\$\$/g;
                // Track display match ranges so inline doesn't overlap
                const displayRanges = [];
                while ((m = displayRegex.exec(markdown)) !== null) {
                    const key = 'latex_display_' + imageIndex;
                    displayLatexBlocks.push({ key, latex: m[1].trim(), fullMatch: m[0] });
                    displayRanges.push({ start: m.index, end: m.index + m[0].length });
                    imageIndex++;
                }

                // Extract inline LaTeX: $...$ but skip anything inside a display block range
                const inlineLatexBlocks = [];
                const inlineRegex = /(?<!\$)\$(?!\$)(.+?)(?<!\$)\$(?!\$)/g;
                while ((m = inlineRegex.exec(markdown)) !== null) {
                    const pos = m.index;
                    const inDisplay = displayRanges.some(r => pos >= r.start && pos < r.end);
                    if (inDisplay) continue;
                    const key = 'latex_inline_' + imageIndex;
                    inlineLatexBlocks.push({ key, latex: m[1].trim(), fullMatch: m[0] });
                    imageIndex++;
                }

            // Extract mermaid blocks — these still need images
            const mermaidBlocksList = [];
            const mermaidRegex = /```mermaid\s*\n([\s\S]*?)```/g;
            while ((m = mermaidRegex.exec(markdown)) !== null) {
                const key = 'mermaid_' + imageIndex;
                mermaidBlocksList.push({ key, code: m[1].trim(), fullMatch: m[0] });
                imageIndex++;
            }

            setProgress(20);

            // Build OMML map for LaTeX
            const ommlMap = {};
            for (const block of displayLatexBlocks) {
                ommlMap[block.key] = latexToOMML(block.latex);
            }
            for (const block of inlineLatexBlocks) {
                ommlMap[block.key] = latexToOMML(block.latex);
            }

            // Render mermaid to images
            for (const block of mermaidBlocksList) {
                const result = await mermaidToBase64Png(block.code);
                if (result) imageMap[block.key] = result;
            }

            setProgress(50);

            // Add mermaid images to zip and build relationships
            const imageRels = [];
            let relId = 10;
            const imageRelMap = {};

            for (const [key, imgData] of Object.entries(imageMap)) {
                const rId = 'rId' + relId;
                const filename = 'media/' + key + '.png';
                zip.file('word/' + filename, imgData.base64, { base64: true });
                imageRels.push({ rId, target: filename });
                imageRelMap[key] = { rId, width: imgData.width, height: imgData.height };
                relId++;
            }

            setProgress(60);

            const docXml = getWordDocumentWithImages(markdown, displayLatexBlocks, inlineLatexBlocks, mermaidBlocksList, imageRelMap, ommlMap);

            zip.file('[Content_Types].xml', getContentTypesWithImages());
            zip.file('_rels/.rels', getRels());
            zip.file('word/_rels/document.xml.rels', getDocumentRelsWithImages(imageRels));
            zip.file('word/styles.xml', getStyles());
            zip.file('word/numbering.xml', getNumbering());
            zip.file('word/document.xml', docXml);

            return await zip.generateAsync({ type: 'blob' });
        }
        function escapeXml(str) {

        function parseTextFormatting(text) {
            let result = [];
            let i = 0;
            
            while (i < text.length) {
                // Bold (**text**)
                if (text.substring(i, i + 2) === '**') {
                    const endIdx = text.indexOf('**', i + 2);
                    if (endIdx !== -1) {
                        const boldText = text.substring(i + 2, endIdx);
                        result.push({ type: 'bold', text: boldText });
                        i = endIdx + 2;
                        continue;
                    }
                }
                // Italic (*text*) - but not ** which is bold
                if (text[i] === '*' && i + 1 < text.length && text[i + 1] !== '*') {
                    const endIdx = text.indexOf('*', i + 1);
                    if (endIdx !== -1 && text[endIdx + 1] !== '*') {
                        const italicText = text.substring(i + 1, endIdx);
                        result.push({ type: 'italic', text: italicText });
                        i = endIdx + 1;
                        continue;
                    }
                }
                // Italic (_text_)
                if (text[i] === '_' && i + 1 < text.length && text[i + 1] !== '_') {
                    const endIdx = text.indexOf('_', i + 1);
                    if (endIdx !== -1 && text[endIdx + 1] !== '_') {
                        const italicText = text.substring(i + 1, endIdx);
                        result.push({ type: 'italic', text: italicText });
                        i = endIdx + 1;
                        continue;
                    }
                }
                // Inline code (`text`)
                if (text[i] === '`') {
                    const endIdx = text.indexOf('`', i + 1);
                    if (endIdx !== -1) {
                        const codeText = text.substring(i + 1, endIdx);
                        result.push({ type: 'code', text: codeText });
                        i = endIdx + 1;
                        continue;
                    }
                }
                // Regular text (up to next formatting marker)
                let regularText = '';
                while (i < text.length && 
                       !(text[i] === '*' && (text[i + 1] === '*' || (i + 1 < text.length && text[i + 1] !== '*'))) &&
                       !(text[i] === '_' && (text[i + 1] === '_' || (i + 1 < text.length && text[i + 1] !== '_'))) &&
                       text[i] !== '`') {
                    regularText += text[i];
                    i++;
                }
                if (regularText) {
                    result.push({ type: 'text', text: regularText });
                }
            }
            return result;
        }

        function formatTextToXml(text) {
            const parts = parseTextFormatting(text);
            let xml = '';
            
            for (let i = 0; i < parts.length; i++) {
                const part = parts[i];

                if (part.type === 'bold') {
                    xml += '<w:r><w:rPr><w:b/></w:rPr><w:t xml:space="preserve">' + escapeXml(textContent) + '</w:t></w:r>';

                    xml += '<w:r><w:rPr><w:i/></w:rPr><w:t xml:space="preserve">' + escapeXml(textContent) + '</w:t></w:r>';

                } else {
                    xml += '<w:r><w:t xml:space="preserve">' + escapeXml(textContent) + '</w:t></w:r>';
                }
            }
            return xml;
        }

        function parseTableRows(tableLines) {
            const dataRows = [];
            let headerFound = false;
            
            for (let i = 0; i < tableLines.length; i++) {
                const line = tableLines[i];
                
                // Check if this is a separator row (only pipes and dashes)
                if (line.match(/^\s*\|\s*:?-+:?\s*(\|\s*:?-+:?\s*)*\|?\s*$/)) {
                    // If we just added a row and now we see a separator, mark the previous row as header
                    if (dataRows.length === 1 && !headerFound) {
                        dataRows[0].isHeader = true;
                        headerFound = true;
                    }
                    continue;
                }
                
                // Parse cells from line
                let cells = line.split('|');
                // Remove empty strings from edges if they exist
                cells = cells.filter(c => c.trim().length > 0);
                cells = cells.map(c => c.trim());
                
                if (cells.length > 0) {
                    dataRows.push({ cells: cells, isHeader: false });
                }
            }
            
            // If no separator was found, treat the first row as header
            if (!headerFound && dataRows.length > 0) {
                dataRows[0].isHeader = true;
            }
            
            return dataRows;
        }

            }
            const drawingType = isInline ? 'inline' : 'inline'; // both use inline in OOXML
            return '<w:drawing><wp:inline distT="0" distB="0" distL="0" distR="0" xmlns:wp="http://schemas.openxmlformats.org/drawingml/2006/wordprocessingDrawing"><wp:extent cx="' + emuW + '" cy="' + emuH + '"/><wp:docPr id="' + Math.floor(Math.random()*100000) + '" name="Image"/><a:graphic xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main"><a:graphicData uri="http://schemas.openxmlformats.org/drawingml/2006/picture"><pic:pic xmlns:pic="http://schemas.openxmlformats.org/drawingml/2006/picture"><pic:nvPicPr><pic:cNvPr id="0" name="Image"/><pic:cNvPicPr/></pic:nvPicPr><pic:blipFill><a:blip r:embed="' + rId + '" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"/><a:stretch><a:fillRect/></a:stretch></pic:blipFill><pic:spPr><a:xfrm><a:off x="0" y="0"/><a:ext cx="' + emuW + '" cy="' + emuH + '"/></a:xfrm><a:prstGeom prst="rect"><a:avLst/></a:prstGeom></pic:spPr></pic:pic></a:graphicData></a:graphic></wp:inline></w:drawing>';
        }
        function getWordDocument(markdown) {
            let xml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><w:body>';

            const lines = markdown.split('\n');
            let inTable = false;
            let tableLines = [];

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];

                // Flush table if we were building one and hit non-table line
                if (inTable && !line.includes('|')) {
                    xml += buildTable(tableLines);
                    tableLines = [];
                    inTable = false;
                }

                // Check for custom indent syntax
                const customIndent = getParagraphIndent(line);
                if (customIndent) {
                    const indentValue = getIndentValue(customIndent.indent);
                    xml += '<w:p><w:pPr><w:pStyle w:val="Normal"/><w:ind w:left="' + indentValue + '"/></w:pPr>' + formatTextToXml(customIndent.text) + '</w:p>';
                }
                // Title (#)
                else if (line.match(/^#\s/)) {
                    const text = line.replace(/^#\s/, '');
                    xml += '<w:p><w:pPr><w:pStyle w:val="Title"/></w:pPr>' + formatTextToXml(text) + '</w:p>';
                }
                // Heading 1 (##)
                else if (line.match(/^##\s/)) {
                    const text = line.replace(/^##\s/, '');
                    xml += '<w:p><w:pPr><w:pStyle w:val="Heading1"/></w:pPr>' + formatTextToXml(text) + '</w:p>';
                }
                // Heading 2 (###)
                else if (line.match(/^###\s/)) {
                    const text = line.replace(/^###\s/, '');
                    xml += '<w:p><w:pPr><w:pStyle w:val="Heading2"/></w:pPr>' + formatTextToXml(text) + '</w:p>';
                }
                // Heading 3 (####)
                else if (line.match(/^####\s/)) {
                    const text = line.replace(/^####\s/, '');
                    xml += '<w:p><w:pPr><w:pStyle w:val="Heading3"/></w:pPr>' + formatTextToXml(text) + '</w:p>';
                }
                // Ordered lists with multi-level support
                else if (line.match(/^\s*\d+\.\s/)) {
                    const { level, trimmedLine } = detectListLevel(line);
                    const text = trimmedLine.replace(/^\d+\.\s/, '');
                    const indent = getIndentValue(level);
                    xml += '<w:p><w:pPr><w:pStyle w:val="ListParagraph"/><w:numPr><w:ilvl w:val="' + level + '"/><w:numId w:val="1"/></w:numPr><w:ind w:left="' + (720 + indent) + '" w:hanging="360"/></w:pPr>' + formatTextToXml(text) + '</w:p>';
                }
                // Unordered lists with multi-level support
                else if (line.match(/^\s*[\*\-\+]\s/)) {
                    const { level, trimmedLine } = detectListLevel(line);
                    const text = trimmedLine.replace(/^[\*\-\+]\s/, '');
                    const indent = getIndentValue(level);
                    xml += '<w:p><w:pPr><w:pStyle w:val="ListParagraph"/><w:numPr><w:ilvl w:val="' + level + '"/><w:numId w:val="2"/></w:numPr><w:ind w:left="' + (720 + indent) + '" w:hanging="360"/></w:pPr>' + formatTextToXml(text) + '</w:p>';
                }
                // Blockquotes
                else if (line.match(/^>\s/)) {
                    const text = line.replace(/^>\s/, '');
                    xml += '<w:p><w:pPr><w:pStyle w:val="Quote"/></w:pPr>' + formatTextToXml(text) + '</w:p>';
                }
                // Code blocks
                else if (line.trim().startsWith('```')) {
                    i++;
                    const code = [];
                    while (i < lines.length && !lines[i].trim().startsWith('```')) {
                        code.push(escapeXml(lines[i]));
                        i++;
                    }
                    xml += '<w:p><w:pPr><w:pStyle w:val="Code"/></w:pPr><w:r><w:rPr><w:rFonts w:ascii="Courier New"/></w:rPr><w:t>' + code.join('\n') + '</w:t></w:r></w:p>';
                }
                // Tables - collect all table lines
                else if (line.includes('|')) {
                    inTable = true;
                    tableLines.push(line);
                }
                // Horizontal rule
                else if (line.match(/^---+$/)) {
                    xml += '<w:p><w:pPr><w:pBdr><w:bottom w:val="single" w:sz="12" w:space="1" w:color="C0C0C0"/></w:pBdr></w:pPr></w:p>';
                }
                // Normal paragraph
                else if (line.trim()) {
                    xml += '<w:p><w:pPr><w:pStyle w:val="Normal"/></w:pPr>' + formatTextToXml(line) + '</w:p>';
                }
            }

            // Flush remaining table
            if (inTable && tableLines.length > 0) {
                xml += buildTable(tableLines);
            }

            xml += '</w:body></w:document>';
            return xml;
        }
      function getWordDocumentWithImages(markdown, displayLatexBlocks, inlineLatexBlocks, mermaidBlocksList, imageRelMap, ommlMap) {
            let processed = markdown;
            for (const block of mermaidBlocksList) {
                processed = processed.replace(block.fullMatch, '::mermaid_image::' + block.key + '::');
            }
            for (const block of displayLatexBlocks) {
                processed = processed.replace(block.fullMatch, '::latex_display::' + block.key + '::');
            }
            for (const block of inlineLatexBlocks) {
                processed = processed.replace(block.fullMatch, '::latex_inline::' + block.key + '::');
            }

            let xml = '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships" xmlns:wp="http://schemas.openxmlformats.org/drawingml/2006/wordprocessingDrawing" xmlns:m="http://schemas.openxmlformats.org/officeDocument/2006/math"><w:body>';

            const lines = processed.split('\n');
            let inTable = false;
            let tableLines = [];

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];

                if (inTable && !line.includes('|')) {
                    xml += buildTable(tableLines);
                    tableLines = [];
                    inTable = false;
                }

                // Mermaid image placeholder
                if (line.match(/^::mermaid_image::(.+)::$/)) {
                    const key = line.match(/^::mermaid_image::(.+)::$/)[1];
                    const img = imageRelMap[key];
                    if (img) {
                        xml += '<w:p><w:pPr><w:jc w:val="center"/></w:pPr><w:r>' + buildImageXml(img.rId, img.width, img.height, false) + '</w:r></w:p>';
                    }
                    continue;
                }

                // Display LaTeX → native OMML equation paragraph
                if (line.match(/^::latex_display::(.+)::$/)) {
                    const key = line.match(/^::latex_display::(.+)::$/)[1];
                    const omml = ommlMap[key];
                    if (omml) {
                        xml += '<w:p><w:pPr><w:jc w:val="center"/></w:pPr><m:oMathPara><m:oMathParaPr><m:jc m:val="center"/></m:oMathParaPr>' + omml + '</m:oMathPara></w:p>';
                    }
                    continue;
                }

                // Check for custom indent syntax
                const customIndent = getParagraphIndent(line);
                if (customIndent) {
                    const indentValue = getIndentValue(customIndent.indent);
                    xml += '<w:p><w:pPr><w:pStyle w:val="Normal"/><w:ind w:left="' + indentValue + '"/></w:pPr>' + formatTextWithInlineOmml(customIndent.text, ommlMap) + '</w:p>';
                }
                else if (line.match(/^#\s/)) {
                    const text = line.replace(/^#\s/, '');
                    xml += '<w:p><w:pPr><w:pStyle w:val="Title"/></w:pPr>' + formatTextWithInlineOmml(text, ommlMap) + '</w:p>';
                }
                else if (line.match(/^##\s/)) {
                    const text = line.replace(/^##\s/, '');
                    xml += '<w:p><w:pPr><w:pStyle w:val="Heading1"/></w:pPr>' + formatTextWithInlineOmml(text, ommlMap) + '</w:p>';
                }
                else if (line.match(/^###\s/)) {
                    const text = line.replace(/^###\s/, '');
                    xml += '<w:p><w:pPr><w:pStyle w:val="Heading2"/></w:pPr>' + formatTextWithInlineOmml(text, ommlMap) + '</w:p>';
                }
                else if (line.match(/^####\s/)) {
                    const text = line.replace(/^####\s/, '');
                    xml += '<w:p><w:pPr><w:pStyle w:val="Heading3"/></w:pPr>' + formatTextWithInlineOmml(text, ommlMap) + '</w:p>';
                }
                else if (line.match(/^\s*\d+\.\s/)) {
                    const { level, trimmedLine } = detectListLevel(line);
                    const text = trimmedLine.replace(/^\d+\.\s/, '');
                    const indent = getIndentValue(level);
                    xml += '<w:p><w:pPr><w:pStyle w:val="ListParagraph"/><w:numPr><w:ilvl w:val="' + level + '"/><w:numId w:val="1"/></w:numPr><w:ind w:left="' + (720 + indent) + '" w:hanging="360"/></w:pPr>' + formatTextWithInlineOmml(text, ommlMap) + '</w:p>';
                }
                else if (line.match(/^\s*[\*\-\+]\s/)) {
                    const { level, trimmedLine } = detectListLevel(line);
                    const text = trimmedLine.replace(/^[\*\-\+]\s/, '');
                    const indent = getIndentValue(level);
                    xml += '<w:p><w:pPr><w:pStyle w:val="ListParagraph"/><w:numPr><w:ilvl w:val="' + level + '"/><w:numId w:val="2"/></w:numPr><w:ind w:left="' + (720 + indent) + '" w:hanging="360"/></w:pPr>' + formatTextWithInlineOmml(text, ommlMap) + '</w:p>';
                }
                else if (line.match(/^>\s/)) {
                    const text = line.replace(/^>\s/, '');
                    xml += '<w:p><w:pPr><w:pStyle w:val="Quote"/></w:pPr>' + formatTextWithInlineOmml(text, ommlMap) + '</w:p>';
                }
                else if (line.trim().startsWith('```')) {
                    i++;
                    const code = [];
                    while (i < lines.length && !lines[i].trim().startsWith('```')) {
                        code.push(escapeXml(lines[i]));
                        i++;
                    }
                    xml += '<w:p><w:pPr><w:pStyle w:val="Code"/></w:pPr><w:r><w:rPr><w:rFonts w:ascii="Courier New"/></w:rPr><w:t>' + code.join('\n') + '</w:t></w:r></w:p>';
                }
                else if (line.includes('|')) {
                    inTable = true;
                    tableLines.push(line);
                }
                else if (line.match(/^---+$/)) {
                    xml += '<w:p><w:pPr><w:pBdr><w:bottom w:val="single" w:sz="12" w:space="1" w:color="C0C0C0"/></w:pBdr></w:pPr></w:p>';
                }
                else if (line.trim()) {
                    xml += '<w:p><w:pPr><w:pStyle w:val="Normal"/></w:pPr>' + formatTextWithInlineOmml(line, ommlMap) + '</w:p>';
                }
            }

            if (inTable && tableLines.length > 0) {
                xml += buildTable(tableLines);
            }

            xml += '</w:body></w:document>';
            return xml;
        }

        // Like formatTextToXml but also handles inline LaTeX image placeholders
        // Handle inline LaTeX as native OMML equations within text
        function formatTextWithInlineOmml(text, ommlMap) {
            if (!text.includes('::latex_inline::')) {
                return formatTextToXml(text);
            }

            const parts = text.split(/(::latex_inline::[^:]+::)/);
            let xml = '';
            for (const part of parts) {
                const match = part.match(/^::latex_inline::(.+)::$/);
                if (match) {
                    const key = match[1];
                    const omml = ommlMap[key];
                    if (omml) {
                        xml += omml;
                    }
                } else {
                    xml += formatTextToXml(part);
                }
            }
            return xml;
        }
    </script>
